name: my_dida
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.1+2

environment:
  sdk: ^3.8.1

# Dependencies 依赖
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8 # iOS 风格图标
  go_router: ^16.0.0 # 路由管理
  provider: ^6.1.5 # 状态管理
  isar_community: ^3.3.0 # 数据库支持
  isar_community_flutter_libs: ^3.3.0 # Flutter 特定支持
  path_provider: ^2.1.0 # 获取存储路径
  path: ^1.9.0 # 跨平台路径拼接（附件服务）
  table_calendar: ^3.2.0 # 日历组件
  logger: ^2.6.1 # 日志
  get_it: ^7.2.0 # 依赖注入，用于实现 服务定位器（Service Locator）模式
  intl: ^0.20.2 # 国际化和日期格式化
  flutter_local_notifications: 19.5.0
  flutter_timezone: 4.1.1
  timezone: ^0.10.1
  wakelock_plus: ^1.2.8
  flutter_markdown_plus: ^1.0.1 # Markdown 渲染（任务备注只读态，flutter_markdown 社区维护版）
  markdown_editor_plus: ^0.2.14 # 带 Markdown 工具栏的编辑器（任务备注编辑态）
  image_picker: ^1.1.2 # 相册/相机选取附件图片
  file_picker: ^8.1.4 # 文件选择器（任意类型附件）
  freezed_annotation: ^3.1.0

# dev_dependencies 表示测试依赖
  flutter_markdown: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0 # Flutter 代码规范
  isar_community_generator: ^3.3.0 # Isar 数据库代码生成
  build_runner: ^2.4.13 # 代码生成
  rename: ^3.1.0
  freezed: ^3.2.5
flutter:
  uses-material-design: true
